name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v --cov=epstein_pipeline --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: >
          mypy
          src/epstein_pipeline/config.py
          src/epstein_pipeline/state.py
          src/epstein_pipeline/utils/parallel.py
          src/epstein_pipeline/utils/paths.py
          --ignore-missing-imports

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Validate Neon schema SQL is parseable
        run: |
          python -c "
          from epstein_pipeline.exporters.neon_schema import MIGRATION_SQL, SCHEMA_VERSION
          assert len(MIGRATION_SQL) > 1000, 'Migration SQL too short'
          assert 'CREATE TABLE IF NOT EXISTS documents' in MIGRATION_SQL
          assert 'CREATE TABLE IF NOT EXISTS persons' in MIGRATION_SQL
          assert 'CREATE OR REPLACE FUNCTION semantic_search' in MIGRATION_SQL
          assert f'VALUES ({SCHEMA_VERSION})' in MIGRATION_SQL
          print('Schema validation passed')
          "

  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/release_check.py dist
      - run: python -m epstein_pipeline.cli status --fail-on-unhealthy
      - run: python -m epstein_pipeline.cli --version
