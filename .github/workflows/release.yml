name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" build twine
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: >
          python -m mypy
          src/epstein_pipeline/config.py
          src/epstein_pipeline/state.py
          src/epstein_pipeline/utils/parallel.py
          src/epstein_pipeline/utils/paths.py
          --ignore-missing-imports
      - run: python -m pytest -q
      - run: python -m epstein_pipeline.cli status --fail-on-unhealthy
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/release_check.py dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
